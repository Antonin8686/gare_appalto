# Produzione VPS: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Porte 8080/8443 — non interferisce con Fontane Bianche (80/443 su /var/www/fontanebianchetoday).
# Cartella sul server: /var/www/gare-appalto

services:
  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  minio:
    restart: unless-stopped

  backend:
    restart: unless-stopped
    pull_policy: never

  celery_worker:
    profiles: ["celery"]
    restart: unless-stopped
    pull_policy: never

  frontend:
    restart: unless-stopped
    pull_policy: never
    build:
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "${FRONTEND_HTTP_PORT:-8080}:80"
      - "${FRONTEND_HTTPS_PORT:-8443}:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-gare.fontanebianche.today}
    volumes:
      - ./frontend/nginx.prod.http-serve.conf:/etc/nginx/templates/nginx.prod.http-serve.conf:ro
      - ./frontend/nginx.prod.http-redirect.conf:/etc/nginx/templates/nginx.prod.http-redirect.conf:ro
      - ./frontend/nginx.prod.ssl.conf:/etc/nginx/templates/nginx.prod.ssl.conf:ro
      - ./frontend/docker-entrypoint.prod.sh:/docker-entrypoint.prod.sh:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - media_data:/var/www/media:ro
    command: ["sh", "-c", "sed -i 's/\\r$//' /docker-entrypoint.prod.sh 2>/dev/null; sh /docker-entrypoint.prod.sh"]

volumes:
  certbot_webroot:
