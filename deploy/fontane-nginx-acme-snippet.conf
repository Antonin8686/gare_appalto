# Aggiungi questo blocco al nginx di Fontane Bianche (porta 80) per il certificato SSL
# del sottodominio gare.fontanebianche.today, senza modificare il resto del sito.
#
# Il webroot deve puntare al volume certbot di Gare Appalto:
#   /var/lib/docker/volumes/gareappalto_certbot_webroot/_data
#
# Dopo aver aggiunto il blocco e riavviato Fontane:
#   cd /var/www/gare-appalto && ./scripts/setup-ssl.sh

server {
    listen 80;
    server_name gare.fontanebianche.today;

    location /.well-known/acme-challenge/ {
        root /var/lib/docker/volumes/gareappalto_certbot_webroot/_data;
    }

    location / {
        return 301 http://$host:8080$request_uri;
    }
}
